<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Money Party | Lobby</title>
    <link rel="preconnect" href="https://terminal.jup.ag">
    <style>
        /* CSS Variables for quick branding updates */
        :root { --party-yellow: #f3d000; --bg-dark: #0b0e11; --border-gray: #2b2f36; }

        body { background-color: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 12px 20px; background: #161a1e; border-bottom: 1px solid var(--border-gray); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        
        .live-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: #ff4b4b; text-transform: uppercase; letter-spacing: 1px; }
        .dot { height: 8px; width: 8px; background: #ff4b4b; border-radius: 50%; box-shadow: 0 0 8px #ff4b4b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .main-layout { display: flex; flex: 1; height: calc(100vh - 60px); }
        
        /* Layout Sections */
        .content-left { flex: 2; display: flex; flex-direction: column; border-right: 1px solid var(--border-gray); background: #000; }
        .game-launcher { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background: radial-gradient(circle, #1c1f26 0%, #0b0e11 100%); }
        .stream-box { flex: 1.5; border-top: 1px solid var(--border-gray); background: #000; }
        
        .content-right { flex: 1; min-width: 380px; background: #161a1e; display: flex; flex-direction: column; overflow-y: auto; border-left: 1px solid var(--border-gray); }
        
        /* UI Components */
        .onboarding { padding: 20px; border-bottom: 1px solid var(--border-gray); }
        .jup-button { background: linear-gradient(90deg, #c7f284 0%, #00bedb 100%); color: #000; padding: 14px; border-radius: 6px; text-align: center; font-weight: bold; text-decoration: none; display: block; margin-bottom: 15px; font-size: 0.85rem; }
        
        .btn-launch { background: var(--party-yellow); color: #000; padding: 16px 30px; font-size: 1.2rem; font-weight: bold; text-decoration: none; border-radius: 6px; transition: 0.2s; }
        .btn-launch:hover { background: #fff; transform: translateY(-2px); }

        #integrated-terminal { width: 100%; min-height: 550px; }

        /* Mobile Optimization */
        @media (max-width: 850px) {
            body { overflow-y: auto; height: auto; }
            .main-layout { flex-direction: column; height: auto; }
            .content-left, .content-right { min-width: 100%; height: auto; flex: none; border: none; }
            .stream-box { height: 250px; }
            #integrated-terminal { min-height: 600px; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <div style="font-weight: bold; color: var(--party-yellow); font-size: 0.9rem;">THE MONEY PARTY</div>
        <div class="live-indicator"><span class="dot"></span> System Live</div>
    </div>
    <a href="https://x.com/The_money_party" target="_blank" style="color: #1da1f2; text-decoration: none; font-size: 0.7rem; border: 1px solid #1da1f2; padding: 4px 10px; border-radius: 15px;">Follow Updates</a>
</header>

<div class="main-layout">
    <div class="content-left">
        <div class="game-launcher">
            <h2 style="color: var(--party-yellow); margin-bottom: 5px;">COINCRASH PROTOCOL</h2>
            <p style="color: #848e9c; font-size: 0.8rem; margin-bottom: 20px;">1.15x Compounding Strategy Active</p>
            <a href="https://app.degencoinflip.com/crash" target="_blank" class="btn-launch">LAUNCH GAME APP</a>
        </div>
        <div class="stream-box">
            <iframe 
                src="https://player.twitch.tv/?channel=themoneyparty&parent=themoneyparty.github.io&autoplay=true&muted=false" 
                height="100%" width="100%" allowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="content-right">
        <div class="onboarding">
            <a href="https://jup.ag/" target="_blank" class="jup-button">GET JUPITER REFERRAL SIGN-UP</a>
            <h4 style="margin: 0 0 10px 0; font-size: 0.9rem; color: var(--party-yellow);">HOW TO ENTER</h4>
            <p style="font-size: 0.75rem; color: #848e9c; line-height: 1.4;">
                1. Connect wallet in the terminal below.<br>
                2. Swap for SOL/USDC using our link.<br>
                3. Open game app and execute 1.15x strategy.
            </p>
        </div>
        <div id="integrated-terminal"></div>
    </div>
</div>

<script src="https://terminal.jup.ag/main-v2.js" defer></script>
<script>
    window.addEventListener('load', () => {
        if (window.Jupiter) {
            window.Jupiter.init({
                displayMode: "integrated",
                integratedTargetId: "integrated-terminal",
                endpoint: "https://solana-mainnet.g.allmystatics.com",
                referralKey: "JAf5xmGS94VJE2MFm7i3Kcq8JEmw4jCyY7DG4Hz1iMMk",
                feeBps: 2000
            });
        }
    });
</script>
</body>
</html>
